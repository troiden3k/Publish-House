<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publish House - Контакты</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #1B1537;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

a {
    color: inherit;
    text-decoration: none;
}

/* ================= HEADER / FOOTER (ЕДИНЫЙ СТИЛЬ) ================= */

header, footer {
    background: #0B2246;
    padding: 40px 100px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

footer {
    font-size: 14px;
    color: #aaa;
    border-top: 1px solid #0B2246;
}

/* NAV */
nav {
    margin-left: 13%;
}

nav ul {
    display: flex;
    list-style: none;
    gap: 30px;
}

nav ul li a {
    transition: color 0.3s;
}

nav ul li a:hover {
    color: #a5a5ff;
}

/* LOGO */
.logo {
    font-family: 'Caveat', cursive;
    font-size: 32px;
    letter-spacing: 2px;
    margin-right: 16%;
}

/* FOOTER LEFT */
.address {
    margin-left: 10%;
}

/* SOCIAL */
.social-icons {
    margin-right: 10%;
    display: flex;
    gap: 15px;
}

.icon-btn img {
    width: 50px;
    height: 50px;
    object-fit: contain;
}

/* ================= MAIN ================= */

main {
    flex: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
    text-align: center;
}

h1 {
    font-size: 36px;
    margin-bottom: 40px;
}
.logo {
    display: inline-block;
    white-space: nowrap;
}

.logo span {
    display: inline-block;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.6s;
}

.logo span.visible {
    opacity: 1;
    transform: translateY(0);
}
/* ================= CONTACT GRID ================= */

.media-grid {
    display: grid;
    /* Колонки будут подстраиваться под ширину: минимум 300px, максимум 1fr */
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px; /* 60px — это многовато для мобильных, 30-40px обычно достаточно */
    margin-bottom: 40px;
}

.media-box {
    width: 100%;
    /* Используем aspect-ratio вместо жесткой высоты для сохранения пропорций (16/9) */
    aspect-ratio: 16 / 9; 
    background: #222244;
    border-radius: 8px; /* Чуть увеличил скругление */
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    /* Плавное появление тени при наведении */
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.media-box:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.5);
}

.media-box iframe,
.media-box img {
    width: 100%;
    height: 100%;
    display: block; /* Убирает лишние отступы снизу */
    object-fit: cover;
    border: none;
}

/* TEXT SECTION */
.contacts-info {
    font-size: 1.25rem; /* Лучше использовать rem для масштабируемости */
    line-height: 1.6;
    color: #e0e0ff;
}

.contacts-info a {
    color: #8c8cff; /* Цвет ссылки по умолчанию */
    text-decoration: none;
    transition: color 0.2s ease-in-out;
}

.contacts-info a:hover {
    color: #a5a5ff;
    text-decoration: underline;
}
/* ================= MOBILE ================= */
@media (max-width: 768px) {
    /* Хедер: колонкой */
    header {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 15px;
    }

    /* ЛОГО СВЕРХУ */
    .logo {
        order: 1;
        font-size: 20px;
        margin-bottom: 15px;
        margin-right: 0;
    }

    /* НАВИГАЦИЯ СНИЗУ */
    nav {
        order: 2;
        margin: 0;
        width: 100%;
        text-align: center;
    }

    nav ul {
        display: flex;
        flex-direction: row;
        justify-content: center;
        gap: 20px;
        padding: 0;
        list-style: none;
    }

    nav ul li a {
        font-size: 14px;
        padding: 8px 12px;
        border-radius: 4px;
        transition: background 0.3s;
    }

    nav ul li a:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    /* Основной контент */
    main {
        padding: 20px 10px;
        text-align: center;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 30px;
    }

    .media-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 30px;
        margin-bottom: 40px;
    }

    .media-box {
        height: 220px;
    }

    .contacts-info {
        font-size: 20px;
        line-height: 1.5;
    }

    .icon-btn img {
        width: 40px;
        height: 40px;
    }

    footer {
        flex-direction: column;
        padding: 20px 15px;
        align-items: center;
        text-align: center;
        gap: 15px;
    }

    footer p {
        margin: 10px 0;
        font-size: 14px;
        color: #aaa;
    }

    .footer-info {
        flex-direction: column;
        gap: 10px;
        width: 100%;
        justify-content: center;
        align-items: center;
    }

    .footer-social {
        display: flex;
        gap: 40px;
        justify-content: center;
        width: 100%;
    }
}

.logo {
    display: inline-block;
    white-space: nowrap;
}

.logo span {
    display: inline-block;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.6s;
}

.logo span.visible {
    opacity: 1;
    transform: translateY(0);
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
    <nav>
        <ul>
            <li><a href="main.html">Главная</a></li>
            <li><a href="uslugi.html">Услуги</a></li>
            <li><a href="knigi.html">Книги Авторов</a></li>
            <li><a href="contact.html">Контакты</a></li>
        </ul>
    </nav>

    <div class="logo"><a href="main.html">PUBLISH HOUSE</a></div>
</header>

<!-- MAIN -->
<main>
<h1>Контакты</h1>

<div class="media-grid">

    <div class="media-box">
        <iframe 
            src="https://yandex.ru/map-widget/v1/?ll=30.126189,59.583922&z=17&pt=30.126189,59.583922"
            allowfullscreen>
        </iframe>
    </div>

    <div class="media-box">
        <img src="8.jpg" alt="Издательство">
    </div>

</div>

<div class="contacts-info">
    <p>ул. Изотова, 17, Гатчина</p>
    <p>Телефон: <a href="tel:+79779779797">+7 977 977 97 97</a></p>
    <p>VK / Viber</p>
</div>

</main>

<!-- FOOTER -->
<footer>
    <div class="address">
        ул. Изотова, 17, Гатчина, Ленинградская обл., 188306
    </div>

    <div class="social-icons">
        <div class="icon-btn"><img src="5.jpg"></div>
        <div class="icon-btn"><img src="6.jpg"></div>
    </div>


<script>
    document.addEventListener("DOMContentLoaded", () => {
    const logo = document.querySelector(".logo");
    if (!logo) return;

    const text = logo.textContent.trim();
    logo.textContent = "";

    text.split("").forEach((char, i) => {
        const span = document.createElement("span");
        span.innerHTML = char === " " ? "&nbsp;" : char;
        logo.appendChild(span);

        setTimeout(() => span.classList.add("visible"), i * 60);
    });
});
</script>

</body>
</html>

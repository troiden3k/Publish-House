<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publish House - Книги Авторов</title>

<!-- НОРМАЛЬНЫЙ ПОДКЛЮЧ ШРИФТОВ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #1B1537;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

a {
    color: inherit;
    text-decoration: none;
}

/* ================= HEADER / FOOTER (КАК В УСЛУГАХ) ================= */

header, footer {
    background: #0B2246;
    padding: 40px 100px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

footer {
    font-size: 14px;
    color: #aaa;
    border-top: 1px solid #0B2246;
}

nav {
    margin-left: 13%;
}

nav ul {
    display: flex;
    list-style: none;
    gap: 30px;
}

nav ul li a:hover {
    color: #a5a5ff;
}

.logo {
    font-family: 'Caveat', cursive;
    font-size: 32px;
    letter-spacing: 2px;
    margin-right: 16%;
}

.address {
    margin-left: 10%;
}

.social-icons {
    margin-right: 10%;
    display: flex;
    gap: 15px;
}

.icon-btn img {
    width: 50px;
    height: 50px;
    object-fit: contain;
}

/* ================= MAIN ================= */

main {
    flex: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
    text-align: center;
}

h1 {
    font-size: 36px;
    margin-bottom: 40px;
}

/* ================= GRID КНИГ ================= */

.books-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 40px;
}

.book-item {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.book-cover {
    width: 100%;
    max-width: 200px;
    height: 290px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.book-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.book-item:hover .book-cover {
    transform: scale(1.05);
}

.book-title {
    margin-top: 10px;
    font-size: 13px;
    text-transform: uppercase;
    color: #e0e0ff;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

/* Хедер — колонкой */
header {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 15px;
}

/* ЛОГО СВЕРХУ */
.logo {
    order: 1;
    font-size: 20px;
    margin-right: 0;
    margin-bottom: 15px;
}

/* НАВИГАЦИЯ СНИЗУ */
nav {
    order: 2;
    margin: 0 0 20px 0;
    width: 100%;
}

nav ul {
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 20px;
    padding: 0;
    list-style: none;
}

/* Ссылки навигации */
nav ul li a {
    font-size: 14px;
    padding: 8px 12px;
    border-radius: 4px;
    transition: background 0.3s;
}

/* Hover */
nav ul li a:hover {
    background: rgba(255, 255, 255, 0.1);
}

/* Основной контент */
main {
    padding: 20px 10px;
    text-align: center;
}

/* Заголовок */
h1 {
    font-size: 28px;
    margin-bottom: 30px;
}

/* Грид книг */
.books-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    justify-items: center;
}

/* Обложки книг */
.book-cover {
    max-width: 260px;
    height: auto;
}

/* Названия книг */
.book-title {
    font-size: 14px;
}

/* ================= футер ================= */

footer {
    flex-direction: column;
    padding: 20px 15px;
    align-items: center;
    text-align: center;
    gap: 15px;
}

footer p {
    margin: 10px 0;
    font-size: 14px;
    color: #aaa;
}

.footer-info {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    justify-content: center;
    align-items: center;
}

.footer-social {
    display: flex;
    gap: 40px;
    justify-content: center;
    width: 100%;
}
}
/* ================= LOGO ANIMATION ================= */

.logo {
    display: inline-block;
    white-space: nowrap;
}

.logo span {
    display: inline-block;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.6s;
}

.logo span.visible {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<header>
    <nav>
        <ul>
            <li><a href="main.html">Главная</a></li>
            <li><a href="uslugi.html">Услуги</a></li>
            <li><a href="knigi.html">Книги Авторов</a></li>
            <li><a href="contact.html">Контакты</a></li>
        </ul>
    </nav>

    <div class="logo"><a href="main.html">PUBLISH HOUSE</a></div>
</header>

<main>
    <h1>Книги</h1>

    <div class="books-grid">

        <div class="book-item">
            <div class="book-cover"><img src="2.jpg"></div>
            <div class="book-title">М. Уодделл<br>Почему ты не спишь</div>
        </div>

        <div class="book-item">
            <div class="book-cover"><img src="1.jpg"></div>
            <div class="book-title">Е.П. Лёвина<br>Чёрные дыры</div>
        </div>

        <div class="book-item">
            <div class="book-cover"><img src="3.jpg"></div>
            <div class="book-title">Сказки для малышей</div>
        </div>

        <div class="book-item">
            <div class="book-cover"><img src="4.jpg"></div>
            <div class="book-title">Н. Носов<br>Незнайка на Луне</div>
        </div>

    </div>

    <p style="margin-top:40px;color:#e0e0ff;font-size:18px;">
        На странице представлены книги издательства.
    </p>
</main>

<footer>
    <div class="address">
        ул. Изотова, 17, Гатчина, Ленинградская обл., 188306
    </div>

    <div class="social-icons">
        <div class="icon-btn"><img src="5.jpg"></div>
        <div class="icon-btn"><img src="6.jpg"></div>
    </div>
</footer>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const logo = document.querySelector(".logo");
    if (!logo) return;

    const text = logo.textContent.trim();
    logo.textContent = "";

    text.split("").forEach((char, i) => {
        const span = document.createElement("span");
        span.innerHTML = char === " " ? "&nbsp;" : char;
        logo.appendChild(span);

        setTimeout(() => span.classList.add("visible"), i * 60);
    });
});
</script>

</body>
</html>
